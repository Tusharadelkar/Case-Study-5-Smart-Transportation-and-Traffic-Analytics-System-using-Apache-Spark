name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out repository code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up Python environment
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-state: '3.9'

    # 3. Set up Java JDK 11 (required for PySpark tests)
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    # 4. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pyspark xgboost pandas scikit-learn matplotlib seaborn jupyter nbconvert

    # 5. Lint python files (e.g. check syntax errors)
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 6. Test Notebook compilation (compiles Jupyter Notebook to Python script to verify no syntax bugs)
    - name: Test Jupyter Notebook Compilation
      run: |
        jupyter nbconvert --to script notebooks/case_study_optimized.ipynb

    # 7. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 8. Build Docker Image (verification build)
    - name: Build Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false  # Change to true and configure docker credentials to push to registry
        tags: tusharadelkar/jakarta-traffic-analysis:latest
